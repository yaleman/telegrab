name: Run mypy

"on":
  push:
    branches:
      - main  # Set a branch to deploy
  pull_request:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
      - name: Running mypy
        run: |
          uv sync --frozen --group dev
          uv run mypy $(basename $(pwd)) test*.py
