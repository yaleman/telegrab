name: Run linting

"on":
  push:
    branches:
      - main # Set a branch to deploy
  pull_request:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
      - name: Running linting
        run: |
          uv sync --frozen --group dev
          uv run ty check --error-on-warning
